author: "JupiterJaeden"
delete-after: True
changes:
  - spellcheck: "Updates the description of the silver cuffs and the silver cuff resisting message to be a bit more accurate."
  - code_imp: "Removes the old (now redundant) check for removing the silver cuff status effect."
  - bugfix: "Fixes a bug where you would be stuck with the cuff resisting do_after bar (preventing you from doing many things) even after having your cuffs removed by someone else."
  - balance: "Prevent bloodsuckers gaining blood thickening by feeding off each other."
  - bugfix: "Fixes a bug where torpor would not trigger in a vampire's coffin from them having wounds."
  - qol: "Makes the feed message clearer to the victim about the effect on their character's memory."
  - bugfix: "Masquerade no longer automatically disables itself on entering softcrit (as the power description text implies) - although it can still be manually disabled, and it does automatically disable on death."
  - bugfix: "Fixes a bug where you could not use brawn to break cuffs while buckled to something."
  - spellcheck: "Updates the power description on veil of many faces to explain it a little more and give some advice on its usage."