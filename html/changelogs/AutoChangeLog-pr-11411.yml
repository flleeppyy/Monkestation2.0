author: "TheColorCyan"
delete-after: True
changes:
  - bugfix: "(Hatterhat) Projectile damage multipliers on guns are now reflected in their combat information."
  - admin: "(Hatterhat) Admins can now make a gun's fired projectiles better or worse at wounding by changing the gun's projectile_wound_bonus. Surely this will not have any repercussions."
  - qol: "(GPeckman) Clothing now tells you if it is pressure-proof and insulated enough for spacewalking when examining it."
  - qol: "(MrMelbert) The way examine looks has been updated."
  - qol: "(MrMelbert) A person's ID card no longer appears with a big icon on examine. You can now click on their ID card (in the chat box) to get a bigger picture of it, as well as information about them.\nrefactor:(MrMelbert)  Much of examine backend code has been refactored, report any odd looking text."
  - refactor: "(SmArtKar) Refactored how examines display item properties. A lot of them are now displayed as tags that you can hover over to receive details about, like item size, resistances and materials an object is made of."
  - qol: "(SmArtKar) Protection classes now better elaborate on thermal resistances of items, displaying the exact temperatures they can protect you from."
  - qol: "(SmArtKar) Improved descriptions on size tooltips to explain where the item can be stored"