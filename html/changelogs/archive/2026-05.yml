  DaworseplayerEver:
  - rscadd: Added more Medical supplies in Deep Storage such as a syndicate combat
      medical kit and a combat surgical kit!
  - rscadd: Added more items in Deep Storage closet such as operation kits because
      for some reason the ghost roles lack them.
  - rscdel: Removed generally crap items out of the base.
  - rscdel: Removed a syndicate surgical duffle bag kit.
  - qol: Removed some generally unneeded items like cassette players out of the boxes
      in Deep Storage.
  - map: fixed a huge majority of the previously old Deep Storage pipe system which
      had more than 30-40 percent of all pipes inside a wall. Most are fixed now with
      only one system of pipes still being in a wall that links to outputting waste
      gas.
  - map: added a new Virology and containment unit for Deep Storage, features all
      the tools needed to operate it.
  - map: modified the old secured storage into two new chambers in Deep Storage. Classified
      storage, and Secured Storage each containing their own equipment.
  - map: modified Medbay by adding upgraded vendors, expanding the space inside deep
      storage medbay center, and adding additional equipment inside for use.
  - map: added two syndicate modsuit storage units in Secured Storage of Deep Storage,
      also moved pretty much everything else that was old into that area.
  - map: added a small emergency defense armory in Deep storage Classified storage
      containing a empty syndicate Sol rifle with 2 mags of 30 round sol mags with
      ammo to boot. Also moved the other sensitive equipment like headsets and ammo
      inside which is walled off with reinforced walls and reinforced plasma windows.
  - map: added extra Deep storage RTG to balance the extra use of power.
  - map: expanded Deep Storage Xenobio by giving it an extra pen as well as smoothing
      out the place.
  - rscadd: more food in the kitchen to cook with.
  - map: modified Deep Storage dorms to feature beds and bedsheets incase players
      need to SSD or do whatever.
  - qol: Changed much of the access in Deep Storage to feature syndicate access such
      as air alarms and certain lockers and storages. No more will you have your shit
      stolen or be locked out of.
  - rscdel: Deleted alot of flares and flashlights that weren't needed and replaced
      much of the flares with boxed ones instead.
  - map: Deep storage engineering now has a plethora of actual tools and advanced
      firefighting supplies!
  - rscadd: More frontier items to build and use it with!
