  - image: All hud themes now have their own images for storage which may differ from
      their previous look.
  - refactor: Storage's visual portion has been now handled separately as a storage
      interface.
  - balance: Cyborg Chameleon Projector can switch to any crew-aligned cyborg model
      via Right-Click.
  - balance: Cyborg Chameleon Projector can change their disguise name to a different
      random name via Ctrl-Click.
  - bugfix: Cyborg surgery omni-toolset now can pull organs via organ manipulation
      as intended.
  Sakaniko:
  - image: Modified the anime implant cat tail to use the updated sprite that Cat
      Tail organs use.
  - image: Ported resprites for 26 different hairstyles. Check the PR for a list.
  - rscadd: Added 1 new hairstyle - Short Bangs 2.
  TheColorCyan:
  - balance: bloodsuckers can no longer convert mindshielded people or remove their
      mindshield
  - balance: darkspawn can no longer thrall mindshielded people
  - balance: clock cultists, blood cultists and darkspawn thralls resist their mindshields
      to indicate that mindshields dont actually deconvert them
  - bugfix: fixed being able to stip gauzes and scryers from afar
  - bugfix: fixed ammo pouch reskins being invisible
  - bugfix: new osaka sunrise soup is no longer meat type (because it doesnt have
