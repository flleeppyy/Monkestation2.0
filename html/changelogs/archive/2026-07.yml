2026-07-08:
  SirNightKnight:
  - rscadd: added the security riot grenade launcher crate.  contains a grenade launcher
      along with a box each of teargas and flashbang grenades. includes a SWAT mask.
      1,600 credits to purchase.
  - rscadd: added the security biological containment gear crate. contains 3 security
      biosuits, viral analyzer goggles, PENLITE barrier projectors, spaceacillin syringes,
      and pairs of nitrile gloves. costs 2,400 credits to purchase.
  - rscadd: added the portable flasher crate. contains one portable flasher crate.
      costs 400 credits.
  - rscadd: added reflector helmet which functions the same as the reflector vest.
      renamed the reflector vest crate to the reflector armor crate, bumped the price
      from 1,000 to 1,200 credits, and increased the contents to 3 full sets.
  - balance: restructured purchase permissions so all security orders require security
      access and all srmory orders require armory access.
  - balance: sec bio suits have a bit more melee, bullet, and wound armor.
  - balance: moved WT autorifles and ammo from imports to armory orders. the autorifle
      crate now costs 4,000 credits and contains 3 autorifles. non-lethal ammo crates
      cost 1,000 credits and lethal ammo crates cost 1,200 credits.
  - balance: buffed SWAT suits. the suit now has two small item slots and a +2 tackling
      bonus. increased SWAT crate contents to 3 armor sets and bumped the price from
      1,400 to 2,400 credits.
  - balance: lowered the price of mindshield crates from 1,200 to 900 credits.
  - balance: made the automatic variants of the disabler and laser gun available as
      standard security orders for the same price as the regular variants.
  - balance: buffed the energy gun crate to contain 3 energy guns for 1,200 credits
      (previously 2 energy guns for 3,600 credits).
  - balance: doubled the secway's speed to match the janicart and removed the secway
      crate from the contraband listing.
  - balance: lowered the cost of firing pin crates.  firing pin crates cost 1,000
      credits and pay wall firing pins cost 600 credits.
  - rscdel: removed solfed armor and gun crates (except for modular laser guns and
      the Bobr) to reduce catalog bloat.
  - rscdel: removed the Renoster crate and replaced it with a riot shotgun crate.
  - rscdel: removed the anti-tank launcher crate.
  - image: added a new sprite for the SWAT suit.
