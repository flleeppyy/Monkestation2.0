author: "wraith-54321"
delete-after: True
changes:
  - balance: "Takes wizard wand belt cost back down to 2 points but makes it so you can only select 5 of the 7 wand types."
  - balance: "Makes implanted regen cores not be an aheal while off lavaland."
  - balance: "Reduces berserker antimagic to only be ANTIMAGIC_MIND."
  - balance: "Makes space dragons heal the full HP of mobs they eat."
  - balance: "Reduces crew Quarad drum magazine capacity from 120 to 100.(might take it down to 80)"
  - balance: "Reduces Quarad bonus damage from 2.5 to 1.5."
  - balance: "Reworks the durand shield to instead be an additional max stat armor that is hit before the mech."
  - balance: "Cuts mech LMG ammo down by 2/3, it could fire nonstop for 6 minutes before."
  - balance: "Eminence beacons no longer dust the person who uses it(put them onto a vitality sigil to ghost offer)"
  - balance: "Slab scriptures(besides vanguard) no longer have a time limit to use them after invocation."
  - balance: "Clockwork hammer knockback now has a 15 second cooldown."