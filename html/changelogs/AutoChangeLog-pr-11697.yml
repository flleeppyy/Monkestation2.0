author: "SirNightKnight"
delete-after: True
changes:
  - rscadd: "added mapped in engineering carts that are stocked with everything you need to fix breaches and fight fires (to a degree). engineering carts can be bought from cargo for 2k aswell."
  - balance: "girders are crafted unanchored but are heavier and need more force to be moved by space wind. they also take less time to craft."
  - rscadd: "added large oxygen candles."
  - rscadd: "added fuel canisters."
  - bugfix: "fixed a bug with inducers interacting weirdly with non-chargeable objects."
  - code_imp: "repathed smart metal foam grenades to be more consistent."
  - qol: "metal foam can be instantly broken apart with mining tools."
  - qol: "metal foam will place foamed metal plating below itself if the area its on is spaced."
  - qol: "increased the stock of metal foam grenades in the engivend."
  - sound: "added a sound for breaking apart metal foam."
  - bugfix: "cleaned up oxygen candle code, it emits light properly."
  - rscadd: "can click a tile with warning cones to place them where you click. has a neat sound."
  - balance: "CE locker starts with a box of smart metal foam grenades."
  - balance: "welding tools consume more fuel while they are on. increased some welding tool fuel capacities to compensate."
  - qol: "plasmacutters and rapid wiring devices fit in toolbelts."
  - balance: "construction bags can hold any wallframe and warning cones."
  - balance: "advanced plasmacutters weld faster."
  - balance: "plasmacutters use up 5% of their charge for each weld."
  - bugfix: "fixed nanofrost smoke not extinguishing some objects."
  - qol: "increased the reagent capacity of normal and advanced fire extinguishers."
  - bugfix: "fixed computers not having the proper pass flags."